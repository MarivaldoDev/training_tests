{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/x-icon" href="{% static 'global/images/icone.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            const storedTheme = localStorage.getItem("theme");
            const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            const theme = storedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.dataset.theme = theme;
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="{% static 'global/css/home.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/categories.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'global/css/home.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/paginator.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/task_detail.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/login.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/register.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/create_task.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/password_reset.css' %}">
    <link rel="stylesheet" href="{% static 'global/css/dashboard.css' %}">
    <script src="{% static 'global/js/theme.js' %}" defer></script>
</head>
