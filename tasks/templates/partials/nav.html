{% load static %}
<nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm mb-4" aria-label="Navegação principal">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="{% url 'tasks:home' %}">
            <i class="bi bi-ui-checks text-primary fs-4"></i>
            <span>Task Manager</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            
            {% if user.is_authenticated %}
                <ul class="navbar-nav align-items-lg-center gap-2">
                    <li class="nav-item">
                        <a href="{% url 'tasks:tasks' %}" class="nav-link {% if current == 'tasks' %}active fw-semibold{% endif %}">
                            <i class="bi bi-list-task d-lg-none me-2"></i> Tarefas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'tasks:categories' %}" class="nav-link {% if current == 'categories' %}active fw-semibold{% endif %}">
                            <i class="bi bi-tags d-lg-none me-2"></i> Categorias
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'tasks:dashboard' %}" class="nav-link {% if current == 'dashboard' %}active fw-semibold{% endif %}">
                            <i class="bi bi-speedometer2 d-lg-none me-2"></i> Dashboard
                        </a>
                    </li>
                    
                    <span class="d-none d-lg-block mx-2 text-muted">|</span>
                    
                    <li class="nav-item">
                        <a href="{% url 'authors:logout' %}" class="btn btn-outline-danger btn-sm d-flex align-items-center gap-1">
                            <i class="bi bi-box-arrow-right"></i> Sair
                        </a>
                    </li>
                </ul>
            {% else %}
                <ul class="navbar-nav gap-2">
                    <li class="nav-item">
                        <a href="{% url 'authors:login' %}" class="btn btn-primary d-flex align-items-center gap-2">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </a>
                    </li>
                </ul>
            {% endif %}

            <!-- Botão de alternar tema -->
            <button id="themeToggleBtn" class="btn btn-link nav-link px-3 d-flex align-items-center ms-lg-2 mt-3 mt-lg-0 border rounded-pill shadow-sm" type="button" aria-label="Alternar tema luz/escuro">
                <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                <span class="d-lg-none ms-2" id="themeText">Modo Escuro</span>
            </button>

        </div>
    </div>
</nav>

<script src="{% static 'global/js/theme-toggle.js' %}"></script>
