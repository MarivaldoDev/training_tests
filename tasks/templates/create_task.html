<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Criar Tarefa</title>
  <style>
    body{font-family:Inter,system-ui,Arial;background:#f7fafc;padding:32px}
    .card{max-width:720px;margin:0 auto;background:#fff;padding:24px;border-radius:10px;box-shadow:0 8px 24px rgba(2,6,23,0.06)}
    label{display:block;margin-top:12px;font-weight:600}
    input, textarea, select{width:100%;padding:10px;margin-top:6px;border-radius:6px;border:1px solid #e2e8f0}
    .actions{margin-top:18px;display:flex;gap:12px}
    button{background:#2b6cb0;color:white;padding:12px 18px;border-radius:8px;border:none;font-weight:600}
    a{color:#2b6cb0;text-decoration:none;align-self:center}
    .messages{margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Criar Tarefa</h2>
    <div class="messages">
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    </div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit">Salvar</button>
        <a href="{% url 'tasks:dashboard' request.user.id %}">Voltar</a>
      </div>
    </form>
  </div>
</body>
</html>
