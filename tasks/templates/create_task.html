{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="{% static 'global/css/create_task.css' %}">
  <title>Criar Tarefa</title>
</head>
<body>
  <div class="card">
    <h2>Criar Tarefa</h2>
    <div class="messages">
      {% if messages %}
        <ul>
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    </div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit">Salvar</button>
        <a href="{% url 'tasks:dashboard' request.user.id %}">Voltar</a>
      </div>
    </form>
  </div>
</body>
</html>
