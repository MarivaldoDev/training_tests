{% include 'partials/head.html' %}
<body>
  {% include 'partials/nav.html' %}
  <br><br>
  <div class="card">
    <h2>Editar Tarefa</h2>
    {% include 'partials/messages.html' %}
    <form method="post" enctype="multipart/form-data" action="{% url 'tasks:update_task' task.slug %}">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit">Salvar</button>
        <a href="{% url 'tasks:task_detail' %}" class="btn btn-secondary">Voltar</a>
      </div>
    </form>
  </div>
</body>
</html>
