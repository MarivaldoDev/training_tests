repos:
    -   repo: local
        hooks:
        -   id: requirements
            name: atualizando requirements.txt
            entry: bash -c "uv pip freeze > requirements.txt && git add requirements.txt"
            language: system
            pass_filenames: false
            stages: [pre-commit]

    -   repo: https://github.com/pycqa/isort
        rev: 5.13.2
        hooks:
            - id: isort

    -   repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.14.14
        hooks:
            - id: ruff-check
              args: [ --fix ]
            - id: ruff-format