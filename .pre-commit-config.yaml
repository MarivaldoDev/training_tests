repos:
-   repo: local
    hooks:
    -   id: requirements
        name: atualizando requirements.txt
        entry: bash -c "uv pip freeze > requirements.txt && git add requirements.txt"
        language: system
        pass_filenames: false
        stages: [pre-commit]

-   repo: local
    hooks:
    -   id: isort
        name: isort
        entry: bash -c "isort ."
        language: system
        pass_filenames: false
        stages: [pre-commit]

